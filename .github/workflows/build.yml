name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode_15.4.app || true

      - name: Build
        run: swift build -c release

      - name: Package App
        run: |
          chmod +x scripts/package_app.sh
          ./scripts/package_app.sh

      - name: Create ZIP
        run: |
          cd ~/Desktop
          zip -r DimmerFlow.zip "DimmerFlow.app"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DimmerFlow
          path: ~/Desktop/DimmerFlow.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode_15.4.app || true

      - name: Build & Package
        run: |
          swift build -c release
          chmod +x scripts/package_app.sh
          ./scripts/package_app.sh
          cd ~/Desktop && zip -r DimmerFlow.zip "DimmerFlow.app"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ~/Desktop/DimmerFlow.zip
          generate_release_notes: false
          body: fix
